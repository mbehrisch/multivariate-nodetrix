<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Encoding Study – Practice Round</title>

  <link rel="stylesheet" href="styles/page-styling.css" />
  <link rel="stylesheet" href="styles/NodeTrixStyle.css" />
  <link rel="stylesheet" href="styles/MultivariateMatrixStyle.css" />

  <style>
    /* ── Same shell as study.html ── */
    html, body { height: 100vh; overflow: hidden; }

    #study-shell {
      display: flex; height: 100vh; overflow: hidden;
    }
    #study-left {
      width: 360px; flex-shrink: 0; height: 100vh;
      display: flex; flex-direction: column;
      background: #fafafa; border-right: 1px solid #ddd;
      padding: 24px 20px 20px; box-sizing: border-box; overflow-y: auto;
    }
    #study-right {
      flex: 1; height: 100vh; display: flex;
      flex-direction: column; overflow: hidden;
    }
    #graph { border: none; }

    /* ── Left-panel typography (same as study.html) ── */
    .panel-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #aaa; margin: 0 0 6px;
    }
    #task-description {
      font-size: 17px; line-height: 1.65;
      color: #222; margin-bottom: 22px;
    }
    #study-legend { margin-bottom: 18px; }
    .study-legend-list { list-style: none; padding: 0; margin: 0; }
    .study-legend-list li {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; font-size: 12px; color: #333;
    }
    #answer-area {
      margin-top: auto; padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }
    #selected-node-display, #selected-nodes-display {
      font-size: 14px; color: #444; margin: 0 0 10px;
    }

    /* ── Progress bar ── */
    #study-progress-bar { display: flex; gap: 4px; margin-bottom: 6px; }
    .progress-step {
      flex: 1; height: 6px; border-radius: 3px;
      background: #ddd; transition: background 0.2s;
    }
    .progress-step--done    { background: #4caf50; }
    .progress-step--current { background: #ff7f0e; }
    #task-progress { font-size: 12px; color: #999; margin-bottom: 20px; }

    /* ── Edge / node styles (same as study.html) ── */
    /* Scoped under #graph so it wins over bundled NodeTrixStyle.css (.link{1px}),
       which loads after this inline block in the production build. */
    #graph .NLlink { stroke-width: 3px; }
    #graph .NLlabel { font-size: 11px; }
    .node--start { fill: #2ca25f !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    .node--answer-selected { fill: #ff7f0e !important; stroke: #fff !important; stroke-width: 2.5px !important; }

    /* ── Candidate-group node colours (TS4 tasks) ── */
    .node--cand-a { fill: #4e79a7 !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    .node--cand-b { fill: #e15759 !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    .node--cand-c { fill: #59a14f !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    /* Selected candidate nodes: keep group colour, show orange ring */
    .node--cand-a.node--answer-selected { fill: #4e79a7 !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }
    .node--cand-b.node--answer-selected { fill: #e15759 !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }
    .node--cand-c.node--answer-selected { fill: #59a14f !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }

    /* ── Single-click highlight: dim everything outside the selection ── */
    svg.has-highlight .node:not(.node--highlighted):not(.neighbor--highlighted):not(.node--start):not(.node--answer-selected) { opacity: 0.12; pointer-events: none; }
    svg.has-highlight .NLlabel:not(.node--highlighted):not(.neighbor--highlighted):not(.node--start):not(.node--answer-selected) { opacity: 0.12; pointer-events: none; }
    svg.has-highlight .NLlink:not(.edge--highlighted),
    svg.has-highlight .taper-link:not(.edge--highlighted),
    svg.has-highlight .arrow-link:not(.edge--highlighted),
    svg.has-highlight .edge-tooltip-hitarea:not(.edge--highlighted) { opacity: 0.08; pointer-events: none; }

    /* ═══════════════════════════════════════════════
       DEMO OVERLAY SYSTEM
       ═══════════════════════════════════════════════ */

    /* Full-screen modal (welcome / feedback / done) */
    #demo-modal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
    }
    #demo-modal.hidden { display: none; }

    #demo-modal-card {
      background: #fff; border-radius: 12px;
      padding: 36px 40px; max-width: 620px; width: 90%;
      box-shadow: 0 12px 48px rgba(0,0,0,0.35);
    }
    #demo-modal-card h2 {
      font-size: 22px; font-weight: 700; margin: 0 0 14px; color: #111;
    }
    #demo-modal-card p {
      font-size: 15px; line-height: 1.6; color: #444; margin: 0 0 10px;
    }
    #demo-modal-card .demo-modal-btn {
      display: inline-block; margin-top: 20px;
      padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #fff;
      background: #2563eb; transition: background 0.15s;
    }
    #demo-modal-card .demo-modal-btn:hover { background: #1d4ed8; }
    #demo-modal-card .demo-modal-btn.correct-btn { background: #16a34a; }
    #demo-modal-card .demo-modal-btn.correct-btn:hover { background: #15803d; }
    #demo-modal-card .feedback-icon {
      font-size: 36px; margin-bottom: 10px; display: block;
    }
    #demo-modal-card .correct-header  { color: #16a34a; }
    #demo-modal-card .incorrect-header { color: #d97706; }

    /* Spotlight — positions over a target; box-shadow darkens everything else */
    #demo-spotlight {
      position: fixed; z-index: 1001; pointer-events: none;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.52);
      transition: left 0.3s, top 0.3s, width 0.3s, height 0.3s;
    }
    #demo-spotlight.hidden { display: none; }

    /* Tooltip card that appears next to the spotlight */
    #demo-tooltip {
      position: fixed; z-index: 1002;
      background: #fff; border-radius: 10px;
      padding: 18px 22px 14px; max-width: 300px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.28);
      font-family: inherit;
    }
    #demo-tooltip.hidden { display: none; }
    #demo-tooltip h4 {
      font-size: 18px; font-weight: 700; margin: 0 0 8px; color: #111;
    }
    #demo-tooltip p {
      font-size: 16px; line-height: 1.55; color: #444; margin: 0 0 14px;
    }
    #demo-tooltip-btn {
      display: block; width: 100%; padding: 8px 0;
      background: #2563eb; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #demo-tooltip-btn:hover { background: #1d4ed8; }

    /* Step counter badge inside tooltip */
    #demo-step-badge {
      font-size: 11px; color: #999; margin-bottom: 6px; display: block;
    }

    /* "Practice round" banner at the top of the left panel */
    #demo-banner {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 6px; padding: 8px 12px;
      font-size: 12px; color: #1d4ed8; font-weight: 600;
      margin-bottom: 14px; text-align: center;
    }
  </style>
</head>

<body>
  <!-- ═══ DEMO OVERLAY ELEMENTS ═══ -->

  <!-- Full-screen modal for welcome / feedback / done -->
  <div id="demo-modal" class="hidden">
    <div id="demo-modal-card">
      <!-- Content injected by demo.js -->
    </div>
  </div>

  <!-- Spotlight highlight ring -->
  <div id="demo-spotlight" class="hidden"></div>

  <!-- Guided tooltip card -->
  <div id="demo-tooltip" class="hidden">
    <span id="demo-step-badge"></span>
    <h4 id="demo-tooltip-title"></h4>
    <p  id="demo-tooltip-text"></p>
    <button id="demo-tooltip-btn">Next →</button>
  </div>

  <!-- ═══ STUDY SHELL (same layout as study.html) ═══ -->
  <div id="study-shell">

    <div id="study-left">
      <div id="demo-banner">Practice Round</div>

      <div id="study-progress-bar"></div>
      <div id="task-progress"></div>

      <p class="panel-label">Task</p>
      <div id="task-description">Loading…</div>

      <p class="panel-label">Legend</p>
      <div id="candidate-group-legend" style="display:none; margin-bottom:14px;"></div>
      <div id="study-legend"></div>

      <div id="answer-area"></div>
    </div>

    <div id="study-right">
      <div id="graph"></div>
    </div>

  </div>

  <script type="module" src="code/demo.js"></script>
</body>
</html>
