<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodeTrix Visualisation</title>

  <!-- Load Bootstrap and styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/page-styling.css">
  <link rel="stylesheet" href="styles/NodeTrixStyle.css">
  <link rel="stylesheet" href="styles/MultivariateMatrixStyle.css">

  <!-- Load d3 -->
  <script src="https://d3js.org/d3.v6.min.js"></script>
</head>

<body>
  <div class="container-fluid md-4 mt-4" id="main-container">
    <div class="row">
      <!-- Left: Visualization -->
      <div class="col-md-8 mb-4" id="graph-container">
        <h2>NodeTrix Graph Visualisation</h2>
        <div id="graph"></div>
      </div>

      <!-- Right: Instructions and Multivariate Options -->
      <div class="col-md-4">
        <!-- Instructions -->
        <div id="instructions" class="mb-4">
          <h4>How to use:</h4>
          <ul>
            <li>Drag and drop <strong>matrices</strong> over other matrices to merge</li>
            <li>Drag and drop <strong>nodes</strong> over matrices or other nodes to merge</li>
            <li><kbd>Ctrl</kbd>+Click a matrix row or column header to drop the node from the matrix</li>
          </ul>
        </div>

        <!-- Headers-->
        <div id="multivariate-options" class="card p-3">
          <h4 class="mb-2">Multivariate options</h4>
          <h5 class="mt-3">Edges</h5>

          <!-- Binary variable checkbox -->
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="edge-binary-color-toggle">
            <label class="form-check-label" for="edge-binary-color-toggle">
              Binary variable: Codeshare
            </label>
          </div>

          <!-- Binary variable legend -->
          <div id="binary-variable-legend-container" style="display: none;">
            <ul id="binary-legend-list"></ul>
          </div>

          <!-- Nominal variable checkbox -->
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="edge-categorical-color-toggle">
            <label class="form-check-label" for="edge-categorical-color-toggle">
              Categorical variable: Airlines
            </label>
          </div>

          <!-- Nominal variable legend -->
          <div id="categorical-variable-legend-container" style="display: none;">
            <ul id="categorical-legend-list"></ul>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.4.0/math.js"></script>
  <script type="module" src="code/main.js"></script>
</body>
</html>
