<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodeTrix Visualisation</title>

  <!-- Load style -->
  <link rel="stylesheet" href="styles/page-styling.css">
  <link rel="stylesheet" href="styles/NodeTrixStyle.css">
  <!-- Load d3 -->
  <script src="https://d3js.org/d3.v6.min.js"></script>
</head>

<body>
  <div id="main-container">
    <div id="graph-container">
      <h2>NodeTrix Graph Visualisation</h2>
      <div id="graph"></div>
    </div>

    <div id="instructions">
      <h4>How to use:</h4>
      <ul>
        <li>Drag and drop <strong>matrices</strong> over other matrices to merge</li>
        <li>Drag and drop <strong>nodes</strong> over matrices or other nodes to merge</li>
        <li><kbd>Ctrl</kbd>+Click a matrix row or column header to drop the node from the matrix</li>
      </ul>
      <button id="color-scale-btn">Apply Job Color Scale</button>
    </div>
  </div>

  <script type="module" src="code/main.js"></script>
</body>
</html>
