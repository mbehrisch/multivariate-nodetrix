<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Encoding Study</title>

  <!-- Same three CSS files as index.html -->
  <link rel="stylesheet" href="styles/page-styling.css" />
  <link rel="stylesheet" href="styles/NodeTrixStyle.css" />
  <link rel="stylesheet" href="styles/MultivariateMatrixStyle.css" />

  <style>
    /* ── Override page-styling defaults for the study layout ── */
    html, body {
      height: 100vh;
      overflow: hidden;
    }

    /* Two-panel shell */
    #study-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left panel ── */
    #study-left {
      width: 360px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      border-right: 1px solid #ddd;
      padding: 24px 20px 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    /* ── Right panel ── */
    /* display:flex + flex-direction:column lets #graph (flex:1
       from page-styling.css) expand to full panel height */
    #study-right {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* main.js will append <svg id="study-svg"> here.
       flex:1 + border are already set by page-styling.css */
    #graph {
      border: none; /* remove the decorative border for the study */
    }

    /* ── Left-panel typography ── */
    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin: 0 0 6px;
    }

    #task-description {
      font-size: 17px;
      line-height: 1.65;
      color: #222;
      margin-bottom: 22px;
    }

    #study-legend {
      margin-bottom: 18px;
    }

    .study-legend-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .study-legend-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      color: #333;
    }

    /* ── Overall progress bar ── */
    #study-progress-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }

    .progress-step {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      transition: background 0.2s;
    }

    .progress-step--done    { background: #4caf50; }
    .progress-step--current { background: #ff7f0e; }

    #task-progress {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    /* ── Answer area docked at the bottom ── */
    #answer-area {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }

    #selected-node-display {
      font-size: 14px;
      color: #444;
      margin: 0 0 10px;
    }

    /* ── Base edge thickness ──────────────────────────────────────────────
       Scoped under #graph (id+class specificity) so these win over the bundled
       NodeTrixStyle.css rules (.link{stroke-width:1}, .label{font-size:6px}),
       which load AFTER this inline block in the production build and would
       otherwise override equal-specificity selectors. No !important, so the
       numerical-thickness encoding (set via inline .style) still takes priority. */
    #graph .NLlink {
      stroke-width: 3px;
    }

    /* ── Node labels: bigger in the study than in the main interface ── */
    #graph .NLlabel {
      font-size: 11px;
    }

    /* ── Starting airport for navigation / attribute tasks ── */
    .node--start {
      fill: #2ca25f !important;
      stroke: #fff !important;
      stroke-width: 2.5px !important;
    }

    /* ── Airports selected as the answer in select-nodes tasks ── */
    .node--answer-selected {
      fill: #ff7f0e !important;
      stroke: #fff !important;
      stroke-width: 2.5px !important;
    }

    /* ── Candidate-group node colours (TS4 tasks) ── */
    .node--cand-a { fill: #4e79a7 !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    .node--cand-b { fill: #e15759 !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    .node--cand-c { fill: #59a14f !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    /* Selected candidate nodes: keep group colour, show orange ring */
    .node--cand-a.node--answer-selected { fill: #4e79a7 !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }
    .node--cand-b.node--answer-selected { fill: #e15759 !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }
    .node--cand-c.node--answer-selected { fill: #59a14f !important; stroke: #ff7f0e !important; stroke-width: 5px !important; }

    /* ── Single-click highlight: dim everything outside the selection ── */
    svg.has-highlight .node:not(.node--highlighted):not(.neighbor--highlighted):not(.node--start):not(.node--answer-selected) { opacity: 0.12; pointer-events: none; }
    svg.has-highlight .NLlabel:not(.node--highlighted):not(.neighbor--highlighted):not(.node--start):not(.node--answer-selected) { opacity: 0.12; pointer-events: none; }
    svg.has-highlight .NLlink:not(.edge--highlighted),
    svg.has-highlight .taper-link:not(.edge--highlighted),
    svg.has-highlight .arrow-link:not(.edge--highlighted),
    svg.has-highlight .edge-tooltip-hitarea:not(.edge--highlighted) { opacity: 0.08; pointer-events: none; }

    /* Selected-nodes answer display (mirrors #selected-node-display) */
    #selected-nodes-display {
      font-size: 14px;
      color: #444;
      margin: 0 0 4px;
    }

    /* ── Per-task confidence rating (inline in the answer area) ── */
    #confidence-area { margin-top: 14px; padding-top: 12px; border-top: 1px dashed #ddd; }
    .conf-label { font-size: 13px; font-weight: 600; margin: 0 0 6px; color: #333; }
    .conf-scale { display: flex; gap: 6px; }
    .conf-btn {
      flex: 1; padding: 8px 0; border: 1px solid #ccc; background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 14px; color: #333;
    }
    .conf-btn:hover { background: #5681f7; }
    .conf-btn--active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .conf-ends { display: flex; justify-content: space-between; font-size: 10px; color: #999; margin-top: 3px; }

    /* ── End-of-study condition ratings page (compact) ── */
    #ratings-overlay {
      position: fixed; inset: 0; z-index: 3000; background: #fff;
      overflow-y: auto; padding: 24px 20px;
    }
    #ratings-overlay .ratings-card { max-width: 640px; margin: 0 auto; }
    #ratings-overlay h2 { font-size: 20px; margin: 0 0 6px; color: #111; }
    #ratings-overlay > .ratings-card > p { font-size: 13px; color: #555; margin: 0 0 16px; }
    .rate-condition { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
    .rate-condition-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .rate-cname { font-size: 15px; font-weight: 700; color: #111; }
    .rate-cdesc { font-size: 13px; color: #555; }
    /* Real-encoding sample edges */
    .rate-samples { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; }
    .rate-eg { display: inline-flex; align-items: center; gap: 5px; }
    .rate-eg-lbl { font-size: 11px; color: #555; }
    /* Mock of the hover tooltip shown for the tooltip-only style */
    .rate-tooltip-mock {
      display: inline-block; background: #2b2b2b; color: #fff;
      font-size: 11px; line-height: 1.35; padding: 4px 8px; border-radius: 5px;
    }
    .rate-tooltip-mock .ttl-route { display: block; font-weight: 600; }
    .rate-tooltip-mock .ttl-country { display: block; color: #ddd; }
    /* One Likert row: question | lo | scale | hi, all on one line */
    .rate-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    .rate-q { font-size: 13px; color: #333; flex: 0 0 150px; }
    .rate-lo, .rate-hi { font-size: 10px; color: #999; flex-shrink: 0; }
    .rate-scale { display: inline-flex; gap: 5px; }
    .rate-btn {
      width: 34px; height: 34px; border: 1px solid #ccc; background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #333;
    }
    .rate-btn:hover { background: #f0f4ff; }
    .rate-btn--active { background: #2563eb; color: #fff; border-color: #2563eb; }
    #ratings-submit { margin-top: 8px; }
  </style>
</head>

<body>
  <div id="study-shell">

    <!-- ────────────── Left panel ────────────── -->
    <div id="study-left">

      <!-- Overall progress: one segment per task -->
      <div id="study-progress-bar"></div>
      <div id="task-progress"></div>

      <p class="panel-label">Task</p>
      <div id="task-description">Loading…</div>

      <p class="panel-label">Legend</p>
      <div id="candidate-group-legend" style="display:none; margin-bottom:14px;"></div>
      <div id="study-legend"></div>

      <div id="task-progress"></div>

      <!-- Answer area: populated dynamically by study.js -->
      <div id="answer-area"></div>

    </div>

    <!-- ────────────── Right panel ────────────── -->
    <!-- main.js (imported by study.js) reads #graph's bounding rect
         and appends <svg id="study-svg"> inside it. -->
    <div id="study-right">
      <div id="graph"></div>
    </div>

  </div>

  <script type="module" src="code/study.js"></script>
</body>
</html>
